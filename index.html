<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pet Planner</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="setup">

<h2>Configurer ton animal</h2>

<input id="petName" placeholder="Nom">

<input id="petBirth" type="date">

<input id="petType" placeholder="Espèce">

<input id="petPhoto" type="file">

<button onclick="savePet()">Continuer</button>

</div>


<div id="app">

<header>

<h1 id="petTitle"></h1>

<div class="profileBox">

<img id="profilePic" onclick="openProfile()">

<button id="addButton" onclick="toggleEventForm()">+</button>

</div>

</header>


<div class="calendarHeader">

<button class="arrow" onclick="changeMonth(-1)">‹</button>

<h2 id="monthTitle"></h2>

<button class="arrow" onclick="changeMonth(1)">›</button>

</div>


<div id="calendar"></div>


<div id="eventCreator">

<input id="eventTitle" placeholder="Titre">

<input id="eventDate" type="date">

<input id="eventTime" type="time">

<select id="eventRepeat">
<option value="none">Pas de récurrence</option>
<option value="weekly">Chaque semaine</option>
</select>

<button onclick="addEvent()">Ajouter</button>

</div>


<div id="profileModal">

<h2>Profil</h2>

<input id="editName">

<input id="editBirth" type="date">

<input id="editType">

<input id="editPhoto" type="file">

<button onclick="updateProfile()">Sauvegarder</button>

<button onclick="closeProfile()">Fermer</button>

</div>

</div>


<script>

let events = JSON.parse(localStorage.getItem("events")) || []
let currentDate = new Date()

function savePet(){

let file = petPhoto.files[0]
let reader = new FileReader()

reader.onload = function(){

let pet = {

name: petName.value,
birth: petBirth.value,
type: petType.value,
photo: reader.result

}

localStorage.setItem("pet", JSON.stringify(pet))
location.reload()

}

if(file) reader.readAsDataURL(file)

}

function loadPet(){

let pet = JSON.parse(localStorage.getItem("pet"))

if(!pet){

setup.style.display="flex"
app.style.display="none"
return

}

setup.style.display="none"
app.style.display="block"

petTitle.innerText=pet.name
profilePic.src=pet.photo

}

function openProfile(){

let pet = JSON.parse(localStorage.getItem("pet"))

profileModal.style.display="flex"

editName.value=pet.name
editBirth.value=pet.birth
editType.value=pet.type

}

function closeProfile(){

profileModal.style.display="none"

}

function updateProfile(){

let pet = JSON.parse(localStorage.getItem("pet"))

pet.name=editName.value
pet.birth=editBirth.value
pet.type=editType.value

localStorage.setItem("pet", JSON.stringify(pet))
location.reload()

}

function toggleEventForm(){

let form = document.getElementById("eventCreator")

if(form.style.display==="flex"){

form.style.display="none"

}else{

form.style.display="flex"

}

}

function addEvent(){

let title=eventTitle.value
let date=eventDate.value
let time=eventTime.value
let repeat=eventRepeat.value

let exists = events.find(e=> e.date===date && e.time===time)

if(exists){

alert("Un évènement est déjà programmé le "+date+" à "+time)
return

}

let event={title,date,time,repeat}

events.push(event)

localStorage.setItem("events",JSON.stringify(events))

generateCalendar()

eventCreator.style.display="none"

}

function generateCalendar(){

calendar.innerHTML=""

let year=currentDate.getFullYear()
let month=currentDate.getMonth()

let firstDay=new Date(year,month,1).getDay()
let daysInMonth=new Date(year,month+1,0).getDate()

monthTitle.innerText=currentDate.toLocaleDateString("fr-FR",{month:"long",year:"numeric"})

for(let i=0;i<firstDay;i++){

calendar.appendChild(document.createElement("div"))

}

for(let d=1; d<=daysInMonth; d++){

let day=document.createElement("div")
day.className="day"

let dateStr=year+"-"+String(month+1).padStart(2,"0")+"-"+String(d).padStart(2,"0")

day.innerHTML="<span>"+d+"</span>"

events.forEach(e=>{

if(e.date===dateStr){

let ev=document.createElement("div")

ev.className="event"

ev.innerText=e.time+" "+e.title

day.appendChild(ev)

}

})

calendar.appendChild(day)

}

}

function changeMonth(n){

currentDate.setMonth(currentDate.getMonth()+n)

generateCalendar()

}

function checkNotifications(){

if(Notification.permission!=="granted"){

Notification.requestPermission()

}

setInterval(()=>{

let now=new Date()

events.forEach(e=>{

let eventDate=new Date(e.date+"T"+e.time)

if(

now.getHours()===eventDate.getHours() &&
now.getMinutes()===eventDate.getMinutes() &&
now.toISOString().slice(0,10)===e.date

){

new Notification("Rappel",{

body:e.title

})

}

})

},60000)

}

loadPet()
generateCalendar()
checkNotifications()

</script>

</body>
</html>
