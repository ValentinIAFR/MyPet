<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pet Planner</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="setup">

<h2>Configure ton animal</h2>

<input id="petName" placeholder="Nom de l'animal">

<input id="petBirth" type="date">

<input id="petType" placeholder="Espèce">

<input id="petPhoto" type="file">

<button onclick="savePet()">Commencer</button>

</div>


<div id="app">

<header>

<h1 id="petTitle"></h1>

<img id="profilePic" onclick="openProfile()">

</header>


<div class="calendarHeader">

<button onclick="changeMonth(-1)">‹</button>

<h2 id="monthTitle"></h2>

<button onclick="changeMonth(1)">›</button>

</div>


<div id="calendar"></div>


<div class="addEvent">

<input id="eventTitle" placeholder="Titre">

<input id="eventDate" type="date">

<input id="eventTime" type="time">

<button onclick="addEvent()">Ajouter événement</button>

</div>


<div id="profileModal">

<h2>Profil</h2>

<input id="editName">

<input id="editBirth" type="date">

<input id="editType">

<input id="editPhoto" type="file">

<button onclick="updateProfile()">Sauvegarder</button>

<button onclick="closeProfile()">Fermer</button>

</div>

</div>


<script>

let events = JSON.parse(localStorage.getItem("events")) || []

let currentDate = new Date()

function savePet(){

let file = document.getElementById("petPhoto").files[0]

let reader = new FileReader()

reader.onload = function(){

let pet = {

name: document.getElementById("petName").value,
birth: document.getElementById("petBirth").value,
type: document.getElementById("petType").value,
photo: reader.result

}

localStorage.setItem("pet", JSON.stringify(pet))

location.reload()

}

if(file) reader.readAsDataURL(file)

}

function loadPet(){

let pet = JSON.parse(localStorage.getItem("pet"))

if(!pet){

document.getElementById("setup").style.display="flex"
document.getElementById("app").style.display="none"

return

}

document.getElementById("setup").style.display="none"
document.getElementById("app").style.display="block"

document.getElementById("petTitle").innerText = pet.name
document.getElementById("profilePic").src = pet.photo

}

function openProfile(){

let pet = JSON.parse(localStorage.getItem("pet"))

document.getElementById("profileModal").style.display="flex"

document.getElementById("editName").value = pet.name
document.getElementById("editBirth").value = pet.birth
document.getElementById("editType").value = pet.type

}

function closeProfile(){

document.getElementById("profileModal").style.display="none"

}

function updateProfile(){

let pet = JSON.parse(localStorage.getItem("pet"))

pet.name = document.getElementById("editName").value
pet.birth = document.getElementById("editBirth").value
pet.type = document.getElementById("editType").value

let file = document.getElementById("editPhoto").files[0]

if(file){

let reader = new FileReader()

reader.onload = function(){

pet.photo = reader.result

localStorage.setItem("pet", JSON.stringify(pet))

location.reload()

}

reader.readAsDataURL(file)

}else{

localStorage.setItem("pet", JSON.stringify(pet))

location.reload()

}

}

function generateCalendar(){

let calendar = document.getElementById("calendar")

calendar.innerHTML=""

let year = currentDate.getFullYear()
let month = currentDate.getMonth()

let firstDay = new Date(year,month,1).getDay()
let daysInMonth = new Date(year,month+1,0).getDate()

document.getElementById("monthTitle").innerText =
currentDate.toLocaleDateString("fr-FR",{month:"long",year:"numeric"})

for(let i=0;i<firstDay;i++){

let empty = document.createElement("div")

calendar.appendChild(empty)

}

for(let d=1; d<=daysInMonth; d++){

let day = document.createElement("div")

day.className="day"

let dateStr =
year+"-"+String(month+1).padStart(2,"0")+"-"+String(d).padStart(2,"0")

day.innerHTML="<span>"+d+"</span>"

events
.filter(e=>e.date===dateStr)
.forEach(e=>{

let ev = document.createElement("div")

ev.className="event"

ev.innerText=e.time+" "+e.title

day.appendChild(ev)

})

calendar.appendChild(day)

}

}

function changeMonth(n){

currentDate.setMonth(currentDate.getMonth()+n)

generateCalendar()

}

function addEvent(){

let event={

title:document.getElementById("eventTitle").value,
date:document.getElementById("eventDate").value,
time:document.getElementById("eventTime").value

}

events.push(event)

localStorage.setItem("events",JSON.stringify(events))

generateCalendar()

}

loadPet()

generateCalendar()

</script>

</body>
</html>
